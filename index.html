<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Pages Sample</title>
    <meta name="description" content="OpenClawで作ったGitHub Pages向けHTMLサンプル" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="container">
      <p class="eyebrow">GitHub Pages Sample</p>
      <h1>こんにちは、GitHub Pages</h1>
      <p class="lead">
        これは Raspberry Pi 上の OpenClaw から作った、静的ホスティング向けの最小サンプルです。
      </p>

      <section class="card">
        <h2>やっていること</h2>
        <ul>
          <li>HTML / CSS / JS だけで動く</li>
          <li>ビルド不要</li>
          <li>そのまま GitHub Pages に置ける</li>
        </ul>
      </section>

      <section class="card accent">
        <h2>今の時刻</h2>
        <p id="clock">読み込み中...</p>
        <button id="themeToggle" type="button">テーマ切り替え</button>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
